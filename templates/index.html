<!DOCTYPE html>
<html>
<head>
    <title>Glaucoma Detection System</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#1e3c72,#2a5298);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            margin:0;
        }

        .container{
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,0,0,0.3);
            text-align:center;
            width:450px;
        }

        h1{
            color:#1e3c72;
        }

        p{
            color:gray;
        }

        input[type=file]{
            margin:20px;
        }

        button{
            background:#1e3c72;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#16305d;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>👁 Glaucoma Detection System</h1>

    <p>Upload a Retinal Fundus Image</p>

    <form action="/predict" method="POST" enctype="multipart/form-data">

        <input type="file" name="image" required>

        <br>

        <button type="submit">
            Predict
        </button>

    </form>

</div>

</body>
</html>
